<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台统计 - what do you want ?</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page admin-page">
      <section class="panel">
        <p class="eyebrow">实时后台统计</p>
        <h1>what do you want&nbsp;&nbsp;?</h1>

        <div class="summary">
          <div>
            <span class="summary-label">提交人数</span>
            <strong id="totalVoters">0</strong>
          </div>
          <div>
            <span class="summary-label">最后更新</span>
            <strong id="updatedAt">--</strong>
          </div>
        </div>

        <div class="stats-list">
          <article class="stat-row">
            <div>
              <span class="choice-key">A</span>
              <span>我更想要一些邪修小tips</span>
            </div>
            <strong><span id="countA">0</span> 人</strong>
          </article>

          <article class="stat-row">
            <div>
              <span class="choice-key">B</span>
              <span>我更想要资源共享（多多益善）</span>
            </div>
            <strong><span id="countB">0</span> 人</strong>
          </article>
        </div>

        <p id="connectionStatus" class="message">正在连接实时数据...</p>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
